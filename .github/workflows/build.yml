name: Build fos-next

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  BUILDROOT_VERSION: "2026.02"
  KERNEL_VERSION: "6.18.22"

jobs:
  agent-test:
    name: fos-agent unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Run tests
        working-directory: agent
        run: go test ./...

      - name: Build agent (verify compilation)
        working-directory: agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" -o /tmp/fos-agent ./cmd/fos-agent
          ls -lh /tmp/fos-agent

  buildroot:
    name: Buildroot x86_64
    runs-on: ubuntu-24.04
    needs: agent-test
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc g++ make cmake \
            libncurses-dev libssl-dev libelf-dev \
            bc bison flex rsync cpio unzip \
            wget curl git file ccache \
            gettext autopoint autoconf automake libtool pkg-config


      - name: Set up Go (for fos-agent cross-build inside Buildroot)
        uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum


      - name: Cache Buildroot source tree
        uses: actions/cache@v5
        with:
          path: build/buildroot-${{ env.BUILDROOT_VERSION }}
          key: buildroot-src-${{ env.BUILDROOT_VERSION }}

      - name: Cache Buildroot downloads
        uses: actions/cache@v5
        with:
          path: build/dl
          key: buildroot-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('buildroot/configs/fsx64_defconfig') }}
          restore-keys: |
            buildroot-dl-${{ env.BUILDROOT_VERSION }}-

      # The host toolchain (cross-gcc, binutils, musl) is the single most
      # expensive part of the build (~15-20 min). Key it on the Buildroot
      # version, kernel version, and the defconfig so it is only invalidated
      # when the toolchain configuration actually changes.
      - name: Cache Buildroot host toolchain
        uses: actions/cache@v5
        with:
          path: build/output/host
          key: buildroot-host-${{ env.BUILDROOT_VERSION }}-${{ env.KERNEL_VERSION }}-${{ hashFiles('buildroot/configs/fsx64_defconfig') }}
          restore-keys: |
            buildroot-host-${{ env.BUILDROOT_VERSION }}-${{ env.KERNEL_VERSION }}-

      # Per-package build directories and target rootfs. Both are cached together
      # with the same key so they stay in sync — if only build/ is restored but
      # not target/, Buildroot skips reinstalling packages (stamp files say done)
      # and target-finalize fails trying to edit target/etc/inittab.
      - name: Cache Buildroot package builds
        uses: actions/cache@v5
        with:
          path: |
            build/output/build
            build/output/target
          key: buildroot-pkgs-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('buildroot/configs/fsx64_defconfig', 'buildroot/package/**') }}-${{ github.sha }}
          restore-keys: |
            buildroot-pkgs-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('buildroot/configs/fsx64_defconfig', 'buildroot/package/**') }}-
            buildroot-pkgs-${{ env.BUILDROOT_VERSION }}-

      - name: Cache Buildroot ccache
        uses: actions/cache@v5
        with:
          path: build/ccache
          key: buildroot-ccache-${{ env.BUILDROOT_VERSION }}-x86_64-${{ github.sha }}
          restore-keys: |
            buildroot-ccache-${{ env.BUILDROOT_VERSION }}-x86_64-

      - name: Build (non-interactive)
        run: ./build.sh -n

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fos-next-x86_64
          path: |
            images/bzImage
            images/init.xz
            images/sha256sums
          retention-days: 30

  release:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs: buildroot
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: fos-next-x86_64
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/bzImage
            release/init.xz
            release/sha256sums
          generate_release_notes: true
